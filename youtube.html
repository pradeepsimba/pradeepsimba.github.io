<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="icon" href="12.png" type="image/icon type">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pradeep Simba</title>

    <!-- Security: restrict where scripts, styles, and network requests may go.
         Only the CDNs and Google's OAuth/Drive endpoints are allowed, so even
         if content injection slipped through, data could not be exfiltrated
         to an attacker-controlled host. -->
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://apis.google.com https://accounts.google.com;
        style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://fonts.googleapis.com https://accounts.google.com;
        font-src https://fonts.gstatic.com https://cdnjs.cloudflare.com;
        img-src 'self' data: https:;
        connect-src https://*.googleapis.com https://accounts.google.com https://apis.google.com;
        frame-src https://accounts.google.com https://content.googleapis.com;
        object-src 'none';
        base-uri 'none';
        form-action 'self';
    ">
    <!-- Security: don't leak this page's URL to sites opened from the list -->
    <meta name="referrer" content="no-referrer">

    <!-- Security: SRI hashes pin the exact CDN file contents; a compromised
         or tampered CDN response will be refused by the browser. -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
        integrity="sha384-/o6I2CkkWC//PSjvWC/eYN7l3xM3tJm8ZzVkCOfp//W05QcE3mlGskpoHB6XqI+B" crossorigin="anonymous">

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        /* ============================================================
           YouTube-style theme
           Light and dark palettes are driven by CSS variables; the
           .dark-mode class on <body> swaps the whole palette.
           ============================================================ */
        :root {
            --yt-bg: #ffffff;
            --yt-bg-raised: #ffffff;
            --yt-text: #0f0f0f;
            --yt-text-secondary: #606060;
            --yt-border: rgba(0, 0, 0, 0.1);
            --yt-hover: #f2f2f2;
            --yt-chip-bg: #f2f2f2;
            --yt-chip-hover: #e5e5e5;
            --yt-chip-active-bg: #0f0f0f;
            --yt-chip-active-text: #ffffff;
            --yt-red: #ff0000;
            --yt-blue: #065fd4;
            --yt-blue-text: #ffffff;
            --yt-searchbar-bg: #ffffff;
            --yt-searchbar-border: #cccccc;
            --yt-search-btn-bg: #f8f8f8;
            --yt-modal-shadow: 0 4px 32px rgba(0, 0, 0, 0.2);
        }

        .dark-mode {
            --yt-bg: #0f0f0f;
            --yt-bg-raised: #212121;
            --yt-text: #f1f1f1;
            --yt-text-secondary: #aaaaaa;
            --yt-border: rgba(255, 255, 255, 0.2);
            --yt-hover: #272727;
            --yt-chip-bg: #272727;
            --yt-chip-hover: #3f3f3f;
            --yt-chip-active-bg: #f1f1f1;
            --yt-chip-active-text: #0f0f0f;
            --yt-blue: #3ea6ff;
            --yt-blue-text: #0f0f0f;
            --yt-searchbar-bg: #121212;
            --yt-searchbar-border: #303030;
            --yt-search-btn-bg: #222222;
            --yt-modal-shadow: 0 4px 32px rgba(0, 0, 0, 0.6);
        }

        body {
            font-family: 'Roboto', 'Segoe UI', sans-serif;
            background-color: var(--yt-bg);
            color: var(--yt-text);
            padding-top: 90px;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        /* --- Top bar --- */
        .navbar {
            background-color: var(--yt-bg);
            border-bottom: 1px solid var(--yt-border);
            padding: 0.5rem 1.5rem;
            transition: background-color 0.2s ease;
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.25rem;
            letter-spacing: -0.5px;
            color: var(--yt-text) !important;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .brand-icon {
            color: var(--yt-red);
            font-size: 1.7rem;
        }

        .navbar-toggler {
            border: none;
            color: var(--yt-text);
            font-size: 1.2rem;
        }

        .navbar-toggler:focus {
            box-shadow: none;
        }

        /* --- YouTube-style search pill --- */
        #search-form {
            flex: 0 1 420px;
        }

        #search-form .form-control {
            border: 1px solid var(--yt-searchbar-border);
            border-right: none;
            border-radius: 40px 0 0 40px;
            background-color: var(--yt-searchbar-bg);
            color: var(--yt-text);
            box-shadow: none;
            padding: 0.45rem 1.1rem;
            font-size: 0.95rem;
        }

        #search-form .form-control:focus {
            border-color: var(--yt-blue);
            outline: none;
            box-shadow: none;
        }

        #search-form .form-control::placeholder {
            color: var(--yt-text-secondary);
        }

        .yt-search-btn {
            border: 1px solid var(--yt-searchbar-border);
            border-radius: 0 40px 40px 0;
            background-color: var(--yt-search-btn-bg);
            color: var(--yt-text-secondary);
            padding: 0 1.3rem;
            cursor: pointer;
        }

        .yt-search-btn:hover {
            color: var(--yt-text);
        }

        @media (max-width: 991.98px) {
            #search-form {
                flex: 1 1 100%;
                width: 100%;
            }

            /* Collapsed menu: buttons spread into an even, tappable grid */
            .auth-buttons {
                width: 100%;
            }

            .auth-buttons .btn {
                flex: 1 1 calc(50% - 0.5rem);
                min-height: 42px;
                white-space: nowrap;
            }
        }

        /* --- Buttons (flat, pill-shaped, YouTube-style) --- */
        .btn {
            border: none;
            border-radius: 18px;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 0.45rem 1rem;
            background-color: var(--yt-chip-bg);
            color: var(--yt-text);
            transition: background-color 0.15s ease, color 0.15s ease;
            box-shadow: none;
        }

        .btn:hover {
            background-color: var(--yt-chip-hover);
            color: var(--yt-text);
        }

        .btn:focus,
        .btn:active {
            box-shadow: none;
        }

        .btn-primary,
        .btn-primary:focus {
            background-color: var(--yt-blue);
            color: var(--yt-blue-text);
        }

        .btn-primary:hover,
        .btn-primary:active {
            background-color: var(--yt-blue);
            color: var(--yt-blue-text);
            filter: brightness(1.1);
        }

        .btn-secondary,
        .btn-secondary:focus {
            background-color: var(--yt-chip-bg);
            color: var(--yt-text);
        }

        .btn-secondary:hover,
        .btn-secondary:active {
            background-color: var(--yt-chip-hover);
            color: var(--yt-text);
        }

        /* Allow Pop-ups — attention-drawing outlined red pill */
        .popup-perm-btn {
            background-color: transparent;
            border: 1px solid var(--yt-red);
            color: var(--yt-red) !important;
            border-radius: 18px;
        }

        .popup-perm-btn:hover {
            background-color: rgba(255, 0, 0, 0.08);
        }

        /* Sign In — YouTube's outlined blue pill with icon feel */
        .signin-btn {
            background-color: transparent;
            border: 1px solid var(--yt-border);
            color: var(--yt-blue) !important;
            border-radius: 18px;
        }

        .signin-btn:hover {
            background-color: rgba(62, 166, 255, 0.1);
            border-color: transparent;
        }

        /* --- Category chips (like YouTube's topic bar) --- */
        /* One horizontal strip: scrolls sideways on narrow screens instead
           of wrapping, exactly like the YouTube app's chip bar. */
        #category-filter {
            max-width: 850px;
            margin: 0 auto;
            flex-wrap: nowrap;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            padding-bottom: 2px;
        }

        #category-filter::-webkit-scrollbar {
            display: none;
        }

        #category-filter .btn {
            border-radius: 8px;
            font-size: 0.88rem;
            padding: 0.35rem 0.8rem;
            background-color: var(--yt-chip-bg);
            color: var(--yt-text);
            white-space: nowrap;
            flex-shrink: 0;
        }

        #category-filter .btn:hover {
            background-color: var(--yt-chip-hover);
        }

        #category-filter .btn.active {
            background-color: var(--yt-chip-active-bg);
            color: var(--yt-chip-active-text);
        }

        /* --- Link list (flat rows, like YouTube search results) --- */
        #app {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
            max-width: 850px;
            margin: 0 auto;
        }

        .card.link-item {
            background-color: transparent;
            border: none;
            border-radius: 12px;
            padding: 0.5rem 0.75rem;
            transition: background-color 0.15s ease;
        }

        .card.link-item:hover {
            background-color: var(--yt-hover);
        }

        /* Thumbnail block: 16:9 like a video thumb, colored per category */
        .link-thumb {
            width: 100px;
            height: 56px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-size: 1.3rem;
            flex-shrink: 0;
            background: linear-gradient(135deg, #555555, #333333);
        }

        .link-thumb.playlist {
            background: linear-gradient(135deg, #ff4e45, #c4302b);
        }

        .link-thumb.channel {
            background: linear-gradient(135deg, #3ea6ff, #065fd4);
        }

        .link-thumb.video {
            background: linear-gradient(135deg, #2ecc71, #1e8449);
        }

        @media (max-width: 575.98px) {
            .link-thumb {
                width: 72px;
                height: 44px;
                font-size: 1.05rem;
            }
        }

        .link-title {
            font-weight: 500;
            font-size: 1rem;
            text-decoration: none;
            color: var(--yt-text);
            word-break: break-word;
        }

        .link-title:hover {
            color: var(--yt-text);
            text-decoration: underline;
        }

        .link-url {
            font-size: 0.8rem;
            color: var(--yt-text-secondary);
            margin-top: 0.1rem;
        }

        /* Category badge — small flat tag like YouTube's LIVE/NEW badges */
        .category-badge {
            display: inline-block;
            font-size: 0.65rem;
            font-weight: 500;
            text-transform: capitalize;
            padding: 0.1rem 0.45rem;
            border-radius: 4px;
            color: #ffffff;
            background-color: #606060;
            vertical-align: 2px;
            margin-left: 0.5rem;
        }

        .category-badge.playlist {
            background-color: #c4302b;
        }

        .category-badge.channel {
            background-color: #065fd4;
        }

        .category-badge.video {
            background-color: #1e8449;
        }

        /* Edit/delete — round icon buttons like YouTube's kebab/actions */
        .card-actions .btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: transparent;
            color: var(--yt-text-secondary);
        }

        .card-actions .btn:hover {
            background-color: var(--yt-chip-hover);
            color: var(--yt-text);
        }

        /* --- Dark mode toggle --- */
        #dark-mode-toggle {
            cursor: pointer;
            font-size: 1.15rem;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--yt-text);
            transition: background-color 0.15s ease;
        }

        #dark-mode-toggle:hover {
            background-color: var(--yt-chip-hover);
        }

        /* --- Status / empty message --- */
        #loading-message {
            text-align: center;
            padding: 60px 20px;
            font-size: 1.05rem;
            color: var(--yt-text-secondary);
        }

        /* --- Modals (flat, rounded 12px like YouTube dialogs) --- */
        .modal-content {
            border: none;
            border-radius: 12px;
            background-color: var(--yt-bg-raised);
            color: var(--yt-text);
            box-shadow: var(--yt-modal-shadow);
        }

        .modal-title {
            color: var(--yt-text);
            font-weight: 500;
        }

        .modal-body p {
            color: var(--yt-text);
        }

        .modal-header,
        .modal-footer {
            border-color: var(--yt-border);
        }

        .form-label {
            color: var(--yt-text-secondary);
            font-size: 0.85rem;
            font-weight: 500;
        }

        .form-control,
        .form-select {
            border: 1px solid var(--yt-border);
            border-radius: 8px;
            background-color: transparent;
            color: var(--yt-text);
            box-shadow: none;
            padding: 0.5rem 0.9rem;
        }

        .form-control:focus,
        .form-select:focus {
            background-color: transparent;
            color: var(--yt-text);
            border-color: var(--yt-blue);
            box-shadow: none;
        }

        .form-control::placeholder {
            color: var(--yt-text-secondary);
            opacity: 0.8;
        }

        .dark-mode .form-select option {
            background-color: #212121;
            color: #f1f1f1;
        }

        .dark-mode .btn-close {
            filter: invert(1) grayscale(100%) brightness(200%);
        }

        /* --- Toasts (YouTube snackbar: always dark) --- */
        #toast-container {
            position: fixed;
            bottom: 1.5rem;
            left: 1.5rem;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 0.5rem;
            pointer-events: none;
        }

        .toast-msg {
            padding: 0.7rem 1.3rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 400;
            background-color: #212121;
            color: #f1f1f1;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.35);
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.25s ease, transform 0.25s ease;
        }

        .toast-msg.show {
            opacity: 1;
            transform: none;
        }

        .toast-msg.success {
            color: #2ecc71;
        }

        .toast-msg.error {
            color: #ff6b60;
        }

        /* ============================================================
           Responsive tuning
           ============================================================ */

        /* Small phones */
        @media (max-width: 575.98px) {
            body {
                padding-top: 76px;
            }

            .navbar {
                padding: 0.4rem 0.75rem;
            }

            .navbar-brand {
                font-size: 1.05rem;
            }

            .brand-icon {
                font-size: 1.4rem;
            }

            .container {
                padding-left: 0.75rem;
                padding-right: 0.75rem;
            }

            .card.link-item {
                padding: 0.4rem 0.4rem;
            }

            .card.link-item .d-flex {
                gap: 0.6rem !important;
            }

            .link-title {
                font-size: 0.9rem;
            }

            .link-url {
                font-size: 0.72rem;
            }

            .category-badge {
                font-size: 0.6rem;
                margin-left: 0.35rem;
            }

            .card-actions .btn {
                width: 34px;
                height: 34px;
                font-size: 0.85rem;
            }

            #loading-message {
                padding: 40px 12px;
                font-size: 0.95rem;
            }

            #toast-container {
                left: 0.75rem;
                right: 0.75rem;
                bottom: 1rem;
                align-items: stretch;
            }

            .toast-msg {
                text-align: center;
            }
        }

        /* Very narrow phones: stack menu buttons full-width */
        @media (max-width: 379.98px) {
            .auth-buttons .btn {
                flex: 1 1 100%;
            }

            .link-thumb {
                width: 56px;
                height: 36px;
                font-size: 0.9rem;
                border-radius: 6px;
            }
        }

        /* Large desktops: let the list breathe like YouTube results */
        @media (min-width: 1400px) {

            #app,
            #category-filter {
                max-width: 1000px;
            }
        }
    </style>


</head>

<body>

    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand order-0" href="#"><i class="fab fa-youtube brand-icon"></i>Pradeep Simba</a>

            <!-- Theme toggle + hamburger stay visible on every screen size -->
            <div class="d-flex align-items-center gap-1 order-1 order-lg-2">
                <div id="dark-mode-toggle" role="button" aria-label="Toggle dark mode">
                    <i id="theme-icon" class="fas fa-moon"></i>
                </div>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent"
                    aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
                    <i class="fas fa-bars"></i>
                </button>
            </div>

            <div class="collapse navbar-collapse order-2 order-lg-1" id="navbarContent">
                <div class="navbar-nav me-lg-3 d-flex flex-lg-row flex-column align-items-lg-center justify-content-lg-end gap-3 mt-3 mt-lg-0 w-100">
                    <form class="d-flex" id="search-form" role="search">
                        <input class="form-control" type="search" placeholder="Search" name="search"
                            aria-label="Search">
                        <button type="submit" class="yt-search-btn" aria-label="Search"><i
                                class="fas fa-search"></i></button>
                    </form>
                    <div class="auth-buttons d-flex flex-wrap gap-2">
                        <button class="btn btn-primary add-book-btn" style="display: none;"><i
                                class="fas fa-plus me-1"></i>Add Link</button>
                        <button class="btn btn-secondary import-btn" style="display: none;">Import JSON</button>
                        <button class="btn btn-primary open-all-btn" style="display: none;"><i
                                class="fas fa-external-link-alt me-1"></i>Open All</button>
                        <button class="btn popup-perm-btn" style="display: none;"
                            title="Pop-ups are blocked — Open All can only open one tab"><i
                                class="fas fa-window-restore me-1"></i>Allow Pop-ups</button>
                        <button class="btn signin-btn" style="display: none;"><i
                                class="far fa-user-circle me-1"></i>Sign In</button>
                        <button class="btn signout-btn" style="display: none;">Sign Out</button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="container my-4">
        <div id="category-filter" class="gap-2 mb-4" style="display: none;">
            <button class="btn btn-sm active" data-category="all">All</button>
            <button class="btn btn-sm" data-category="playlist">Playlists</button>
            <button class="btn btn-sm" data-category="channel">Channels</button>
            <button class="btn btn-sm" data-category="video">Videos</button>
            <button class="btn btn-sm" data-category="other">Other</button>
        </div>
        <div id="app">
            <!-- Links are rendered here by JavaScript -->
            <div id="loading-message">
                Please sign in to load content from Google Drive.
            </div>
        </div>
    </div>

    <div class="modal fade" id="addOrEditBookModal" tabindex="-1" aria-labelledby="addOrEditBookModalLabel"
        aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content p-2">
                <div class="modal-header border-0">
                    <h5 class="modal-title" id="addOrEditBookModalLabel">Add New Link</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="bookForm">
                        <input type="hidden" id="bookId">
                        <div class="mb-3">
                            <label for="bookLink" class="form-label">URL</label>
                            <input type="url" class="form-control" id="bookLink"
                                placeholder="https://www.youtube.com/playlist?list=..." required>
                        </div>
                        <div class="mb-3">
                            <label for="bookTitle" class="form-label">Title (optional)</label>
                            <input type="text" class="form-control" id="bookTitle"
                                placeholder="e.g. Music Playlist, Tech Channel">
                        </div>
                        <div class="mb-3">
                            <label for="bookCategory" class="form-label">Category</label>
                            <select class="form-select" id="bookCategory">
                                <option value="playlist">Playlist</option>
                                <option value="channel">Channel</option>
                                <option value="video">Video</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-primary py-2">Save Link</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <input type="file" id="importFileInput" accept=".json" style="display: none;">


    <script>
        (() => {
            'use strict';

            /* ============================================================
               Pradeep Simba — YouTube link keeper
               Structure:
                 CONFIG   — constants
                 state    — single source of truth for the UI
                 render() — paints the entire UI from state (only place
                            that writes the list DOM)
                 drive    — Google Drive persistence layer
                 persist()— optimistic save: UI first, Drive in background
                 events   — bound once at startup; list clicks use
                            event delegation, so re-renders stay cheap
               ============================================================ */

            // ---------- Config ----------
            const CONFIG = {
                clientId: '537459886788-307bm2c6a257crlcoe0grg5ir23t3hob.apps.googleusercontent.com',
                discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'],
                scopes: 'https://www.googleapis.com/auth/drive.file',
                folderName: 'Pradeep Simba Youtube Data',
                fileName: 'data.json',
            };

            const CATEGORIES = ['playlist', 'channel', 'video', 'other'];
            const FILTER_LABELS = { all: 'All', playlist: 'Playlists', channel: 'Channels', video: 'Videos', other: 'Other' };
            const CATEGORY_ICONS = { playlist: 'fa-list', channel: 'fa-user', video: 'fa-play', other: 'fa-link' };

            // ---------- State (single source of truth) ----------
            const state = {
                signedIn: false,
                status: 'signed-out',   // 'signed-out' | 'loading' | 'ready' | 'error'
                statusText: '',
                books: [],
                category: 'all',
                search: '',
                popupsAllowed: true, // optimistic until a check says otherwise
            };

            let fileId = '';
            let tokenClient = null;
            const ready = { gapi: false, gis: false };

            // ---------- DOM handles (queried once) ----------
            const els = {};

            function bindDom() {
                els.app = document.getElementById('app');
                els.filterBar = document.getElementById('category-filter');
                els.searchForm = document.getElementById('search-form');
                els.searchInput = els.searchForm.elements['search'];
                els.signin = document.querySelector('.signin-btn');
                els.signout = document.querySelector('.signout-btn');
                els.addLink = document.querySelector('.add-book-btn');
                els.import = document.querySelector('.import-btn');
                els.openAll = document.querySelector('.open-all-btn');
                els.popupPerm = document.querySelector('.popup-perm-btn');
                els.importInput = document.getElementById('importFileInput');
                els.bookForm = document.getElementById('bookForm');
                els.bookId = document.getElementById('bookId');
                els.bookTitle = document.getElementById('bookTitle');
                els.bookLink = document.getElementById('bookLink');
                els.bookCategory = document.getElementById('bookCategory');
                els.modalTitle = document.getElementById('addOrEditBookModalLabel');
                els.themeIcon = document.getElementById('theme-icon');
                els.darkToggle = document.getElementById('dark-mode-toggle');
                els.bookModal = new bootstrap.Modal(document.getElementById('addOrEditBookModal'));
            }

            // ---------- Utilities ----------
            const escapeHtml = (value) => String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');

            const uid = () => (crypto.randomUUID
                ? crypto.randomUUID()
                : Date.now().toString(36) + Math.random().toString(36).slice(2, 7));

            const debounce = (fn, ms) => {
                let timer;
                return (...args) => {
                    clearTimeout(timer);
                    timer = setTimeout(() => fn(...args), ms);
                };
            };

            // Guesses a category from common YouTube URL shapes.
            function guessCategory(link) {
                const url = (link || '').toLowerCase();
                if (url.includes('list=') || url.includes('/playlist')) return 'playlist';
                if (url.includes('/channel/') || url.includes('/@') || url.includes('/c/') || url.includes('/user/')) return 'channel';
                if (url.includes('watch?v=') || url.includes('youtu.be/') || url.includes('/shorts/')) return 'video';
                return 'other';
            }

            // Security: the ONLY schemes a saved link may use. Escaping alone
            // does not stop `javascript:` / `data:` URLs from executing when
            // clicked, so every link entering the app passes through here.
            function sanitizeUrl(value) {
                const raw = typeof value === 'string' ? value.trim() : '';
                if (!raw) return '';
                try {
                    const url = new URL(raw);
                    if (url.protocol === 'http:' || url.protocol === 'https:') return url.href;
                } catch { /* not a valid absolute URL */ }
                return '';
            }

            // Accepts a raw object from Drive or an imported JSON file and
            // returns a clean book, or null if it isn't usable. All fields are
            // type-checked and length-capped; the link is scheme-validated.
            function normalizeBook(raw) {
                if (!raw || typeof raw !== 'object') return null;
                const str = (v) => (typeof v === 'string' ? v.trim() : '');
                const title = (str(raw.title) || str(raw.name)).slice(0, 300);
                const link = sanitizeUrl(str(raw.link) || str(raw.url));
                if (!title && !link) return null;
                const category = (str(raw.category) || str(raw.type)).toLowerCase();
                return {
                    id: (typeof raw.id === 'string' && /^[A-Za-z0-9_.:-]{1,64}$/.test(raw.id)) ? raw.id : uid(),
                    title,
                    link,
                    category: CATEGORIES.includes(category) ? category : guessCategory(link),
                };
            }

            // ---------- Toasts (non-blocking feedback) ----------
            function toast(message, type = 'info', duration = 2200) {
                let container = document.getElementById('toast-container');
                if (!container) {
                    container = document.createElement('div');
                    container.id = 'toast-container';
                    document.body.appendChild(container);
                }
                const el = document.createElement('div');
                el.className = `toast-msg ${type}`;
                el.textContent = message;
                container.appendChild(el);
                requestAnimationFrame(() => el.classList.add('show'));
                setTimeout(() => {
                    el.classList.remove('show');
                    setTimeout(() => el.remove(), 400);
                }, duration);
            }

            // ---------- Dialogs (one builder for alert + confirm) ----------
            function showDialog({ title, bodyHtml, buttons }) {
                document.getElementById('appDialog')?.remove();
                const wrapper = document.createElement('div');
                wrapper.innerHTML = `
                    <div class="modal fade" id="appDialog" tabindex="-1" aria-hidden="true">
                        <div class="modal-dialog modal-dialog-centered">
                            <div class="modal-content p-2">
                                <div class="modal-header border-0">
                                    <h5 class="modal-title">${escapeHtml(title)}</h5>
                                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                                </div>
                                <div class="modal-body"><p>${bodyHtml}</p></div>
                                <div class="modal-footer border-0"></div>
                            </div>
                        </div>
                    </div>`;
                const modalEl = wrapper.firstElementChild;
                document.body.appendChild(modalEl);
                const footer = modalEl.querySelector('.modal-footer');
                const modal = new bootstrap.Modal(modalEl);
                for (const { label, style = 'btn-secondary', onClick } of buttons) {
                    const btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = `btn ${style}`;
                    btn.textContent = label;
                    btn.addEventListener('click', () => {
                        modal.hide();
                        onClick?.();
                    });
                    footer.appendChild(btn);
                }
                modalEl.addEventListener('hidden.bs.modal', () => modalEl.remove(), { once: true });
                modal.show();
            }

            const showAlert = (title, message) => showDialog({
                title,
                bodyHtml: message,
                buttons: [{ label: 'OK', style: 'btn-primary' }],
            });

            const showConfirm = (message, onConfirm) => showDialog({
                title: 'Confirm Action',
                bodyHtml: message,
                buttons: [
                    { label: 'Cancel', style: 'btn-secondary' },
                    { label: 'Confirm', style: 'btn-primary', onClick: onConfirm },
                ],
            });

            // ---------- Filtering ----------
            function visibleBooks() {
                const tokens = state.search.toLowerCase().split(' ').filter(Boolean);
                return state.books.filter((book) => {
                    if (state.category !== 'all' && (book.category || 'other') !== state.category) return false;
                    if (!tokens.length) return true;
                    const haystack = `${book.title || ''} ${book.link || ''}`.toLowerCase();
                    return tokens.every((token) => haystack.includes(token));
                });
            }

            // ---------- Render ----------
            function render() {
                // Controls follow sign-in state
                els.signin.style.display = (!state.signedIn && ready.gapi && ready.gis) ? 'block' : 'none';
                els.signout.style.display = state.signedIn ? 'block' : 'none';
                els.addLink.style.display = state.signedIn ? 'block' : 'none';
                els.import.style.display = state.signedIn ? 'block' : 'none';
                els.openAll.style.display = state.signedIn ? 'block' : 'none';
                els.popupPerm.style.display = (state.signedIn && !state.popupsAllowed) ? 'block' : 'none';
                els.filterBar.style.display = state.status === 'ready' ? 'flex' : 'none';

                // Filter chips: active state + live counts
                for (const btn of els.filterBar.querySelectorAll('[data-category]')) {
                    const cat = btn.dataset.category;
                    const count = cat === 'all'
                        ? state.books.length
                        : state.books.filter((b) => (b.category || 'other') === cat).length;
                    btn.classList.toggle('active', state.category === cat);
                    btn.textContent = `${FILTER_LABELS[cat]} (${count})`;
                }

                // Status / empty states
                if (state.status !== 'ready') {
                    const text = state.status === 'signed-out'
                        ? 'Please sign in to load content from Google Drive.'
                        : state.statusText;
                    const color = state.status === 'error' ? ' style="color: #ff6b60;"' : '';
                    els.app.innerHTML = `<div id="loading-message"${color}>${escapeHtml(text)}</div>`;
                    return;
                }

                const visible = visibleBooks();
                if (!visible.length) {
                    const message = (state.search || state.category !== 'all')
                        ? 'No links match your filter.'
                        : 'No links yet. Click "Add Link" to start!';
                    els.app.innerHTML = `<div id="loading-message">${escapeHtml(message)}</div>`;
                    return;
                }

                els.app.innerHTML = visible.map((book) => {
                    const cat = book.category || 'other';
                    const icon = CATEGORY_ICONS[cat] || 'fa-link';
                    return `
                    <div class="card link-item">
                        <div class="d-flex align-items-center gap-3">
                            <a href="${escapeHtml(book.link || '#')}" target="_blank" rel="noopener noreferrer"
                                class="link-thumb ${escapeHtml(cat)}" tabindex="-1">
                                <i class="fas ${icon}"></i>
                            </a>
                            <div class="flex-grow-1" style="min-width: 0;">
                                <a href="${escapeHtml(book.link || '#')}" target="_blank" rel="noopener noreferrer" class="link-title">${escapeHtml(book.title || book.link || 'Untitled')}</a><span class="category-badge ${escapeHtml(cat)}">${escapeHtml(cat)}</span>
                                ${book.title && book.link ? `<div class="link-url text-truncate">${escapeHtml(book.link)}</div>` : ''}
                            </div>
                            <div class="card-actions flex-shrink-0">
                                <button class="btn btn-sm" data-action="edit" data-id="${escapeHtml(book.id)}" title="Edit"><i class="fas fa-edit"></i></button>
                                <button class="btn btn-sm" data-action="delete" data-id="${escapeHtml(book.id)}" title="Delete"><i class="fas fa-trash-alt"></i></button>
                            </div>
                        </div>
                    </div>`;
                }).join('');
            }

            // ---------- Google Drive persistence layer ----------
            const drive = {
                token: () => gapi.client.getToken()?.access_token,

                async ensureFolder() {
                    const cached = localStorage.getItem('app_folder_id');
                    if (cached) {
                        try {
                            const { result } = await gapi.client.drive.files.get({
                                fileId: cached, fields: 'id, mimeType, trashed',
                            });
                            if (result?.mimeType === 'application/vnd.google-apps.folder' && !result.trashed) return cached;
                        } catch { /* stale id — fall through to lookup */ }
                        localStorage.removeItem('app_folder_id');
                    }
                    const { result } = await gapi.client.drive.files.list({
                        q: `name = '${CONFIG.folderName}' and mimeType = 'application/vnd.google-apps.folder' and trashed = false`,
                        fields: 'files(id)',
                    });
                    let folderId = result.files?.[0]?.id;
                    if (!folderId) {
                        const created = await gapi.client.drive.files.create({
                            resource: { name: CONFIG.folderName, mimeType: 'application/vnd.google-apps.folder' },
                            fields: 'id',
                        });
                        folderId = created.result.id;
                    }
                    localStorage.setItem('app_folder_id', folderId);
                    return folderId;
                },

                async ensureFile() {
                    const folderId = await this.ensureFolder();
                    const cached = localStorage.getItem('google_drive_json_file_id');
                    if (cached) {
                        try {
                            const { result } = await gapi.client.drive.files.get({
                                fileId: cached, fields: 'id, parents, trashed',
                            });
                            if (result?.parents?.includes(folderId) && !result.trashed) return cached;
                        } catch { /* stale id — fall through to lookup */ }
                        localStorage.removeItem('google_drive_json_file_id');
                    }
                    const { result } = await gapi.client.drive.files.list({
                        q: `'${folderId}' in parents and name = '${CONFIG.fileName}' and trashed = false`,
                        fields: 'files(id)',
                    });
                    let id = result.files?.[0]?.id;
                    if (!id) {
                        const metadata = { name: CONFIG.fileName, mimeType: 'application/json', parents: [folderId] };
                        const body = new FormData();
                        body.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
                        body.append('file', new Blob(['[]'], { type: 'application/json' }));
                        const response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                            method: 'POST',
                            headers: { Authorization: `Bearer ${this.token()}` },
                            body,
                        });
                        if (!response.ok) throw new Error(`Create file failed: HTTP ${response.status}`);
                        id = (await response.json()).id;
                    }
                    localStorage.setItem('google_drive_json_file_id', id);
                    return id;
                },

                async load(id) {
                    const { body } = await gapi.client.drive.files.get({ fileId: id, alt: 'media' });
                    const parsed = JSON.parse(body || '[]');
                    return (Array.isArray(parsed) ? parsed : []).map(normalizeBook).filter(Boolean);
                },

                async save(id, books) {
                    const response = await fetch(`https://www.googleapis.com/upload/drive/v3/files/${id}?uploadType=media`, {
                        method: 'PATCH',
                        headers: {
                            Authorization: `Bearer ${this.token()}`,
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(books, null, 2),
                    });
                    if (!response.ok) throw new Error(`Save failed: HTTP ${response.status}`);
                },
            };

            // ---------- Persistence: optimistic UI, serialized saves ----------
            // The UI updates immediately; Drive is written in the background.
            // Overlapping saves are collapsed into one trailing write.
            let saveInFlight = false;
            let saveQueued = false;

            async function persist() {
                render();
                if (!fileId) return;
                if (saveInFlight) {
                    saveQueued = true;
                    return;
                }
                saveInFlight = true;
                try {
                    await drive.save(fileId, state.books);
                    toast('Saved to Drive', 'success');
                } catch (error) {
                    console.error('Save error:', error);
                    toast('Could not save to Drive — will retry on your next change.', 'error', 5000);
                } finally {
                    saveInFlight = false;
                    if (saveQueued) {
                        saveQueued = false;
                        persist();
                    }
                }
            }

            // ---------- Auth & lifecycle ----------
            function maybeStart() {
                if (!ready.gapi || !ready.gis) return;
                render();
                if (gapi.client.getToken()) onSignedIn();
            }

            async function onSignedIn() {
                state.signedIn = true;
                state.status = 'loading';
                state.statusText = 'Loading your links from Google Drive...';
                render();
                try {
                    fileId = await drive.ensureFile();
                    state.books = await drive.load(fileId);
                    state.status = 'ready';
                } catch (error) {
                    console.error('Drive setup error:', error);
                    state.status = 'error';
                    state.statusText = 'Error loading content from Google Drive. Check the console for details.';
                }
                render();
                refreshPopupPermission();
            }

            function onSignOut() {
                const token = gapi.client.getToken();
                if (!token) return;
                google.accounts.oauth2.revoke(token.access_token, () => {
                    gapi.client.setToken(null);
                    fileId = '';
                    Object.assign(state, {
                        signedIn: false,
                        status: 'signed-out',
                        statusText: '',
                        books: [],
                        category: 'all',
                        search: '',
                    });
                    els.searchInput.value = '';
                    render();
                });
            }

            // ---------- Book actions ----------
            function openBookModal(mode, bookId = null) {
                els.bookForm.reset();
                els.bookId.value = '';
                els.modalTitle.textContent = mode === 'edit' ? 'Edit Link' : 'Add New Link';
                if (mode === 'edit') {
                    const book = state.books.find((b) => b.id === bookId);
                    if (book) {
                        els.bookId.value = book.id;
                        els.bookTitle.value = book.title || '';
                        els.bookLink.value = book.link || '';
                        els.bookCategory.value = book.category || 'other';
                    }
                }
                els.bookModal.show();
            }

            function submitBookForm(event) {
                event.preventDefault();
                const id = els.bookId.value;
                const link = sanitizeUrl(els.bookLink.value);
                if (!link) {
                    showAlert('Invalid URL', 'Only http:// and https:// links can be saved.');
                    return;
                }
                const data = {
                    title: els.bookTitle.value.trim().slice(0, 300),
                    link,
                    category: CATEGORIES.includes(els.bookCategory.value) ? els.bookCategory.value : 'other',
                };
                if (id) {
                    const index = state.books.findIndex((b) => b.id === id);
                    if (index !== -1) state.books[index] = { ...state.books[index], ...data };
                } else {
                    state.books.push({ id: uid(), ...data });
                }
                els.bookModal.hide();
                persist();
            }

            function deleteBook(bookId) {
                showConfirm('Are you sure you want to delete this link?', () => {
                    state.books = state.books.filter((b) => b.id !== bookId);
                    persist();
                });
            }

            // ---------- Pop-up permission ----------
            // There is no browser API to request pop-up permission, but we can
            // DETECT it: window.open outside a user gesture only succeeds when
            // the user has allowed pop-ups for this site.
            function checkPopupPermission() {
                try {
                    const w = window.open('', '_blank', 'width=120,height=120,left=-9999,top=-9999');
                    if (w) {
                        w.close();
                        return true;
                    }
                } catch { /* treated as blocked */ }
                return false;
            }

            // Runs the silent check (outside any click gesture) and updates the
            // navbar "Allow Pop-ups" button.
            function refreshPopupPermission(notify = false) {
                setTimeout(() => {
                    const allowed = checkPopupPermission();
                    const changed = allowed !== state.popupsAllowed;
                    state.popupsAllowed = allowed;
                    render();
                    if (notify && changed && allowed) {
                        toast('Pop-ups allowed — "Open All" will open every tab', 'success');
                    }
                }, 600);
            }

            // Inside a click gesture the browser always allows ONE pop-up, so a
            // single test proves nothing. Opening TWO in the same gesture works:
            // the second only succeeds when pop-ups are truly allowed — and when
            // it fails, the attempt makes the browser show its "Pop-up blocked"
            // icon in the address bar, which is exactly where the user must click.
            function testPopupsInGesture() {
                const w1 = window.open('', '_blank', 'width=120,height=120,left=-9999,top=-9999');
                const w2 = window.open('', '_blank', 'width=120,height=120,left=-9999,top=-9999');
                w1?.close();
                w2?.close();
                return !!w2;
            }

            function requestPopupPermission() {
                if (testPopupsInGesture()) {
                    state.popupsAllowed = true;
                    render();
                    toast('Pop-ups are already allowed — you\'re all set', 'success');
                    return;
                }
                // The blocked attempt above just made the browser show its
                // "Pop-up blocked" icon — walk the user to it.
                showDialog({
                    title: 'Allow Pop-ups',
                    bodyHtml:
                        'A <b>"Pop-up blocked"</b> icon just appeared at the right end of your address bar ' +
                        '(next to the bookmark star).<br><br>' +
                        '1. Click that icon<br>' +
                        '2. Choose <b>"Always allow pop-ups and redirects from this site"</b><br>' +
                        '3. Click <b>Done</b>, then press <b>Check Again</b> below',
                    buttons: [
                        { label: 'Cancel', style: 'btn-secondary' },
                        {
                            label: 'Check Again',
                            style: 'btn-primary',
                            onClick: () => setTimeout(requestPopupPermission, 300),
                        },
                    ],
                });
            }

            // ---------- Open All ----------
            // Opens every link currently visible (respects category + search).
            // Browsers offer no API to ask for pop-up permission: window.open
            // allows one tab per user gesture and silently blocks the rest.
            // So we try to open everything, collect whatever was blocked, and
            // fall back to an "Open Next" queue — one tab per click always
            // works, no browser settings needed.
            function openAllLinks() {
                const links = visibleBooks()
                    .map((b) => (b.link || '').trim())
                    .filter(Boolean);

                if (!links.length) {
                    showAlert('Nothing to Open', 'There are no links in the current list.');
                    return;
                }

                showConfirm(`Open ${links.length} link(s), each in a new tab?`, () => {
                    const blocked = links.filter((link) => !window.open(link, '_blank', 'noopener,noreferrer'));
                    state.popupsAllowed = blocked.length === 0 || links.length === 1;
                    render();
                    if (blocked.length) {
                        showOpenQueue(blocked, links.length);
                    } else {
                        toast(`Opened ${links.length} tab(s)`, 'success');
                    }
                });
            }

            // Fallback dialog for pop-up-blocked links: every click on
            // "Open Next" is its own user gesture, which browsers always
            // allow to open exactly one tab.
            function showOpenQueue(blockedLinks, totalCount) {
                const queue = [...blockedLinks];
                const openedAtOnce = totalCount - queue.length;

                document.getElementById('appDialog')?.remove();
                const wrapper = document.createElement('div');
                wrapper.innerHTML = `
                    <div class="modal fade" id="appDialog" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
                        <div class="modal-dialog modal-dialog-centered">
                            <div class="modal-content p-2">
                                <div class="modal-header border-0">
                                    <h5 class="modal-title">Pop-ups Blocked</h5>
                                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                                </div>
                                <div class="modal-body">
                                    <p>Your browser allowed ${openedAtOnce} tab(s) and blocked <b>${queue.length}</b>.</p>
                                    <p>Click <b>Open Next</b> repeatedly — one tab opens per click, and this always works without changing any settings.</p>
                                    <p><small>To open everything in one click next time: click the "pop-up blocked" icon in the address bar and choose "Always allow pop-ups from this site".</small></p>
                                </div>
                                <div class="modal-footer border-0">
                                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                                    <button type="button" class="btn btn-primary" id="openNextBtn"></button>
                                </div>
                            </div>
                        </div>
                    </div>`;
                const modalEl = wrapper.firstElementChild;
                document.body.appendChild(modalEl);
                const modal = new bootstrap.Modal(modalEl);
                const openNextBtn = modalEl.querySelector('#openNextBtn');

                const updateLabel = () => {
                    openNextBtn.innerHTML = `<i class="fas fa-external-link-alt me-1"></i>Open Next (${queue.length} left)`;
                };
                updateLabel();

                openNextBtn.addEventListener('click', () => {
                    const link = queue.shift();
                    if (link) window.open(link, '_blank', 'noopener,noreferrer');
                    if (queue.length) {
                        updateLabel();
                    } else {
                        modal.hide();
                        toast('All links opened', 'success');
                    }
                });

                modalEl.addEventListener('hidden.bs.modal', () => modalEl.remove(), { once: true });
                modal.show();
            }

            // ---------- Import ----------
            function handleImportFile(event) {
                const file = event.target.files?.[0];
                event.target.value = '';
                if (!file) return;

                // Security: cap the import size — a multi-hundred-MB file
                // would freeze the tab during JSON.parse.
                if (file.size > 5 * 1024 * 1024) {
                    showAlert('Import Failed', 'File is too large (maximum 5 MB).');
                    return;
                }

                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = JSON.parse(e.target.result);
                        const rawList = Array.isArray(data) ? data
                            : Array.isArray(data?.bookmarks) ? data.bookmarks
                                : Array.isArray(data?.books) ? data.books
                                    : (data && typeof data === 'object') ? [data]
                                        : [];
                        const imported = rawList.map(normalizeBook).filter(Boolean);

                        if (!imported.length) {
                            showAlert('Import Failed', 'No valid links found in the JSON file.');
                            return;
                        }

                        showConfirm(`Found ${imported.length} link(s). Do you want to import them?`, () => {
                            state.books = [...state.books, ...imported];
                            persist();
                        });
                    } catch (error) {
                        console.error('Import error:', error);
                        showAlert('Import Error', 'Failed to parse JSON file. Please ensure it is valid JSON.');
                    }
                };
                reader.readAsText(file);
            }

            // ---------- Theme ----------
            const theme = {
                apply(name) {
                    document.body.classList.toggle('dark-mode', name === 'dark');
                    els.themeIcon.className = name === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
                },
                load() {
                    this.apply(localStorage.getItem('theme') || 'light');
                },
                toggle() {
                    const next = document.body.classList.contains('dark-mode') ? 'light' : 'dark';
                    localStorage.setItem('theme', next);
                    this.apply(next);
                },
            };

            // ---------- Events (bound once) ----------
            function bindEvents() {
                els.darkToggle.addEventListener('click', () => theme.toggle());

                els.signin.addEventListener('click', () => {
                    if (!tokenClient) return;
                    tokenClient.requestAccessToken({ prompt: gapi.client.getToken() ? '' : 'consent' });
                });
                els.signout.addEventListener('click', onSignOut);

                els.addLink.addEventListener('click', () => openBookModal('add'));
                els.import.addEventListener('click', () => els.importInput.click());
                els.importInput.addEventListener('change', handleImportFile);
                els.openAll.addEventListener('click', openAllLinks);
                els.popupPerm.addEventListener('click', requestPopupPermission);
                els.bookForm.addEventListener('submit', submitBookForm);

                // Auto-pick the category from the URL as it's typed (still overridable)
                els.bookLink.addEventListener('input', (e) => {
                    els.bookCategory.value = guessCategory(e.target.value);
                });

                // Search-as-you-type, debounced
                els.searchForm.addEventListener('submit', (e) => e.preventDefault());
                els.searchInput.addEventListener('input', debounce((e) => {
                    state.search = e.target.value.trim();
                    render();
                }, 150));

                // Category filter chips
                els.filterBar.addEventListener('click', (e) => {
                    const btn = e.target.closest('[data-category]');
                    if (!btn) return;
                    state.category = btn.dataset.category;
                    render();
                });

                // Edit/delete via event delegation — survives every re-render
                els.app.addEventListener('click', (e) => {
                    const btn = e.target.closest('[data-action]');
                    if (!btn) return;
                    if (btn.dataset.action === 'edit') openBookModal('edit', btn.dataset.id);
                    if (btn.dataset.action === 'delete') deleteBook(btn.dataset.id);
                });
            }

            // ---------- Startup ----------
            function init() {
                bindDom();
                bindEvents();
                theme.load();
                render();
            }

            // Entry points for the Google SDK script tags below
            window.gapiLoaded = () => {
                gapi.load('client', async () => {
                    try {
                        await gapi.client.init({ discoveryDocs: CONFIG.discoveryDocs });
                        ready.gapi = true;
                        maybeStart();
                    } catch (error) {
                        console.error('Error initializing GAPI client:', error);
                    }
                });
            };

            window.gisLoaded = () => {
                tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: CONFIG.clientId,
                    scope: CONFIG.scopes,
                    callback: (resp) => {
                        if (resp.error) return;
                        gapi.client.setToken(resp);
                        onSignedIn();
                    },
                });
                ready.gis = true;
                maybeStart();
            };

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>

    <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
</body>

</html>
